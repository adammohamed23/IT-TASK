<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght,GRAD@0,17..18,700,50;1,17..18,700,50&family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Personal Course Organizer</title>
  </head>

  <body>
    <!--Header-->
    <div class="header roboto-font">
      <h1>Course Orgainzer</h1>
      <div class="header-links">
        <a href="index.html">Home</a>
        <a href="my courses.html">My Courses</a>
        <a href="Add courses.html">Add Course</a>
        <a href="Contact us.html">Contact Us</a>
      </div>
    </div>

    <!--Landing Page-->
    <div class="contact roboto-font">
      <h1>Contact Us</h1>
      <hr color="#cfcfcf" />
      <h3>If you face any issues with the platform or need academic support, feel free to reach out.</h3>
    <form id="Contact forum">
    
    <div class="input-group">
      <label for="Fullname">Full Name:</label>
      <input type="text" id="Fullname" placeholder="e.g., Adam Mohamed">
    </div>

    <div class="input-group">
      <label for="Email">Email Address:</label>
      <input type="text" id="Email" placeholder="e.g., 123456@gmail.com">
    </div>

    <div class="input-group">
      <label for="Message">Message:</label>
      <textarea id="Message" rows="8" placeholder="e.g., hi i have a problem etc.."></textarea>
    </div>

    <button type="submit" class="btn-save">Save Course</button>
    
  </form>
    </div>
  </body>
</html>
